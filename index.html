        .status-bar { padding: 12px; border-radius: 8px; text-align: center; font-weight: 600; margin-bottom: 25px; font-size: 0.95rem; transition: all 0.3s ease; }

        .form-group { margin-bottom: 16px; }
        label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 0.85rem; color: #374151; }
        
        textarea, input, select { 
            width: 100%; padding: 12px; border: 1px solid var(--border-light); 
            border-radius: 8px; font-family: 'JetBrains Mono', 'Consolas', monospace;

        .password-wrapper { position: relative; display: flex; align-items: center; }
        .password-wrapper input { padding-right: 45px; }
        .toggle-btn { position: absolute; right: 10px; background: none; border: none; padding: 5px; cursor: pointer; font-size: 1.1rem; color: var(--text-muted); width: auto; margin: 0; min-height: unset; }

            width: 100%; padding: 12px 16px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; color: white; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 44px; user-select: none;

        .btn-blue { background: var(--primary); }
        .btn-blue:hover { background: var(--primary-hover); }
        .btn-yellow { background: var(--warning); color: #fff; }
        .btn-yellow:hover { background: var(--warning-hover); }
        .btn-green { background: var(--success); }
        .btn-green:hover { background: var(--success-hover); }
        .btn-red { background: var(--danger); margin-top: 15px;}
        button:disabled { background: #e5e7eb !important; color: #9ca3af !important; cursor: not-allowed; box-shadow: none; transform: none; }

        .hardware-section { margin-top: 30px; padding-top: 20px; border-top: 2px dashed var(--border-light); }
        .hardware-unsupported { display: none; text-align: center; background: #fef3c7; color: #92400e; padding: 12px; border-radius: 8px; font-weight: 600; margin-bottom: 15px; font-size: 0.85rem;}
    </style>
</head>

    async function copiarTexto(idElemento, btnElemento) {
        const campoTexto = document.getElementById(idElemento);
        const texto = campoTexto.value;
        if (!texto) { atualizarStatus("Não há texto para copiar.", "warning"); return; }
        try {
            await navigator.clipboard.writeText(texto);
            const conteudoOriginal = btnElemento.innerHTML;
            btnElemento.innerHTML = `<svg viewBox="0 0 24 24" style="stroke: #10b981;"><polyline points="20 6 9 17 4 12"></polyline></svg> Copiado!`;
            btnElemento.style.color = "#10b981";
            setTimeout(() => { btnElemento.innerHTML = conteudoOriginal; btnElemento.style.color = ""; }, 2000);
        } catch (err) { atualizarStatus("Falha ao copiar texto. Acesso negado.", "error"); }

    function togglePassword() {
        const input = document.getElementById("txt_senha");
        const btn = document.getElementById("btn_toggle");
        if (input.type === "password") { input.type = "text"; btn.innerText = "🙈"; } 
        else { input.type = "password"; btn.innerText = "👁️"; }
    }

    function atualizarStatus(mensagem, tipo = "default") {
        const statusEl = document.getElementById("status");
        statusEl.textContent = mensagem; statusEl.className = "status-bar"; 
        if (tipo === "success") statusEl.classList.add("status-success");
        else if (tipo === "error") statusEl.classList.add("status-error");
        else if (tipo === "warning") statusEl.classList.add("status-warning");
        else statusEl.classList.add("status-default");
    }

    function atualizarContadores() {
        document.getElementById("count_original").innerText = document.getElementById("txt_original").value.length + " chars";
        document.getElementById("count_cripto").innerText = document.getElementById("txt_cripto").value.length + " chars";
    }
    document.getElementById("txt_original").addEventListener("input", atualizarContadores);
    document.getElementById("txt_cripto").addEventListener("input", atualizarContadores);

        document.getElementById("btn_gravar").disabled = true;
        document.getElementById("btn_ler").disabled = true;
        document.getElementById("btn_travar").disabled = true; 
    }

    function vigenere(texto, chave, descriptografar = false) {
        if (!chave) return texto;
        let resultado = "", indexChave = 0;
        for (let i = 0; i < texto.length; i++) {
            let charCode = texto.charCodeAt(i);
            if (charCode >= 32 && charCode <= 126) {
                let shift = chave.charCodeAt(indexChave % chave.length) % 95;
                resultado += String.fromCharCode(descriptografar ? ((charCode - 32 - shift + 95) % 95) + 32 : ((charCode - 32 + shift) % 95) + 32);
                indexChave++;
            } else { resultado += texto.charAt(i); }
        }
        return resultado;
    }

    function xorBase64(texto, chave, descriptografar = false) {
        if (!chave) chave = "padrao";
        if (descriptografar) {
            try {
                let decodificado = atob(texto), resultado = "";

                return decodeURIComponent(escape(resultado));
            } catch (e) { return "Erro: Base64 corrompido."; }
        } else {
            let utf8texto = unescape(encodeURIComponent(texto)), resultado = "";
            for (let i = 0; i < utf8texto.length; i++) resultado += String.fromCharCode(utf8texto.charCodeAt(i) ^ chave.charCodeAt(i % chave.length));
            return btoa(resultado);
        }
    }

                if (algName === 'AES-CTR') { params.counter = iv; params.length = 64; } else { params.iv = iv; }

        } else {
            const iv = crypto.getRandomValues(new Uint8Array(ivLength));
            let params = { name: algName };
            if (algName === 'AES-CTR') { params.counter = iv; params.length = 64; } else { params.iv = iv; }

            const combined = new Uint8Array(iv.length + ciphertext.byteLength);

    async function criptografar() {
        let texto = document.getElementById("txt_original").value.trim();
        let senha = document.getElementById("txt_senha").value.trim();
        let metodo = document.getElementById("combo_metodo").value;
        if (!texto || !senha) return alert("Preencha o Texto Original e a Senha.");
        let resultado = "";
        if (metodo === "vigenere") resultado = vigenere(texto, senha, false);
        else if (metodo === "xor") resultado = xorBase64(texto, senha, false);
        else if (metodo.startsWith("aes")) resultado = await aesNativo(texto, senha, false, metodo);
        document.getElementById("txt_cripto").value = resultado;
        const optText = document.getElementById("combo_metodo").options[document.getElementById("combo_metodo").selectedIndex].text;
        atualizarStatus(`Payload gerado via ${optText}.`, "success");
        atualizarContadores();
    }

    async function descriptografar() {
        let textoCripto = document.getElementById("txt_cripto").value.trim();
        let senha = document.getElementById("txt_senha").value.trim();
        let metodo = document.getElementById("combo_metodo").value;
        if (!textoCripto || !senha) return alert("Preencha o Texto Criptografado e a Senha.");
        let resultado = "";
        if (metodo === "vigenere") resultado = vigenere(textoCripto, senha, true);
        else if (metodo === "xor") resultado = xorBase64(textoCripto, senha, true);
        else if (metodo.startsWith("aes")) resultado = await aesNativo(textoCripto, senha, true, metodo);
        document.getElementById("txt_original").value = resultado;
        if(resultado.startsWith("Erro")) atualizarStatus(resultado, "error");
        else atualizarStatus("Payload descriptografado com sucesso.", "success");
        atualizarContadores();
    }

    async function gravarTag() {
        let texto = document.getElementById("txt_cripto").value.trim();
        if (!texto) return alert("Não há texto criptografado para gravar.");
        try {
            const ndef = new NDEFReader();
            atualizarStatus("Aproxime a tag NFC do sensor...", "warning");
            await ndef.write(texto);
            atualizarStatus("Upload para Tag NFC concluído!", "success");
        } catch (error) { atualizarStatus(`Falha de Hardware: ${error.message}`, "error"); }
    }

    async function lerTag() {
        try {
            const ndef = new NDEFReader();
            await ndef.scan();
            atualizarStatus("Aproxime a tag NFC do sensor...", "warning");
            ndef.onreading = event => {
                for (const record of event.message.records) {
                    if (record.recordType === "text") {
                        const textoLido = new TextDecoder(record.encoding).decode(record.data);
                        document.getElementById("txt_cripto").value = textoLido;
                        document.getElementById("txt_original").value = ""; 
                        atualizarStatus("Tag lida com sucesso. Requer descriptografia.", "success");
                        atualizarContadores();
                        return;
                    }
                }
                atualizarStatus("A tag não contém registros de texto NDEF suportados.", "warning");
            };
            ndef.onreadingerror = () => { atualizarStatus("Corrupção de dados ou leitura interrompida.", "error"); };
        } catch (error) { atualizarStatus(`Erro de I/O: ${error.message}`, "error"); }
    }

    async function travarTag() { alert("Proteção Ativa: Função desativada para evitar perda de hardware de testes."); }
