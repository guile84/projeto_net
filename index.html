<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta name="referrer" content="no-referrer">
    <title>NFC Web Security - Zero Tracking</title>
    
    <style>
        :root {
            --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #ffc107;
            --bg: #f4f7f6; --card-bg: #ffffff; --text: #333333;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; font-size: 1.5rem; margin-top: 0; }
        .status-bar { padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 20px; background: #e2e3e5; color: #383d41; }
        .status-success { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }
        .status-warning { background: #fff3cd; color: #856404; }
        label { font-weight: bold; display: block; margin-top: 15px; font-size: 0.9rem; }
        textarea, input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: monospace; font-size: 1rem; }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }
        
        button { width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; color: white; cursor: pointer; transition: 0.3s; }
        .btn-blue { background: var(--primary); }
        .btn-green { background: var(--success); }
        .btn-yellow { background: var(--warning); color: #333; }
        
        /* NOVO: Estilo claro para botões desabilitados */
        button:disabled {
            background: #e0e0e0 !important;
            color: #888888 !important;
            cursor: not-allowed;
            border: 1px dashed #aaaaaa;
        }

        .hardware-unsupported { display: none; text-align: center; background: #ffeeba; color: #856404; padding: 10px; border-radius: 6px; border: 1px solid #ffe8a1; font-weight: bold; margin-top: 20px; font-size: 0.9rem;}
        .badge { display: inline-block; background: #28a745; color: white; font-size: 0.7rem; padding: 3px 6px; border-radius: 4px; vertical-align: middle; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container" id="app">
    <h2>NFC Web App <span class="badge">Offline & Seguro</span></h2>
    
    <div id="status" class="status-bar">Pronto e operando offline.</div>

    <label>Texto Original:</label>
    <textarea id="txt_original" rows="3" placeholder="Digite o texto aqui..."></textarea>

    <div class="row">
        <div>
            <label>Senha:</label>
            <input type="password" id="txt_senha" placeholder="Sua chave">
        </div>
        <div>
            <label>Algoritmo:</label>
            <select id="combo_metodo">
                <option value="vigenere">Vigenère (1:1)</option>
                <option value="xor">XOR + Base64</option>
                <option value="aes" selected>AES-256 (Nativo WebCrypto)</option>
            </select>
        </div>
    </div>

    <div class="row">
        <button class="btn-blue" onclick="criptografar()">↓ Criptografar</button>
        <button class="btn-yellow" onclick="descriptografar()">↑ Descriptografar</button>
    </div>

    <label>Texto Criptografado (Memória da Tag):</label>
    <textarea id="txt_cripto" rows="4" placeholder="Resultado criptografado irá aqui..."></textarea>

    <div id="unsupported" class="hardware-unsupported">
        ⚠️ Bloqueado: A leitura/gravação NFC requer o Google Chrome em um Android e conexão HTTPS.
    </div>

    <button class="btn-green" id="btn_gravar" onclick="gravarTag()">Gravar na Tag NFC</button>
    <button class="btn-blue" id="btn_ler" onclick="lerTag()" style="margin-top: 10px;">Ler Tag NFC</button>
</div>

<script>
    document.cookie = "teste=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";

    function atualizarStatus(mensagem, tipo = "") {
        const statusEl = document.getElementById("status");
        statusEl.textContent = mensagem;
        statusEl.className = "status-bar";
        if (tipo === "success") statusEl.classList.add("status-success");
        else if (tipo === "error") statusEl.classList.add("status-error");
        else if (tipo === "warning") statusEl.classList.add("status-warning");
    }

    // NOVO: Lógica de bloqueio com alteração de texto nos botões
    if (!("NDEFReader" in window)) {
        document.getElementById("unsupported").style.display = "block";
        
        let btnGravar = document.getElementById("btn_gravar");
        let btnLer = document.getElementById("btn_ler");
        
        btnGravar.disabled = true;
        btnLer.disabled = true;
        
        btnGravar.innerText = "Gravação Indisponível";
        btnLer.innerText = "Leitura Indisponível";
        
        atualizarStatus("Modo Criptografia: Apenas Texto (NFC Incompatível)", "warning");
    }

    function vigenere(texto, chave, descriptografar = false) {
        if (!chave) return texto;
        let resultado = "";
        let indexChave = 0;
        for (let i = 0; i < texto.length; i++) {
            let charCode = texto.charCodeAt(i);
            if (charCode >= 32 && charCode <= 126) {
                let shift = chave.charCodeAt(indexChave % chave.length) % 95;
                if (descriptografar) resultado += String.fromCharCode(((charCode - 32 - shift + 95) % 95) + 32);
                else resultado += String.fromCharCode(((charCode - 32 + shift) % 95) + 32);
                indexChave++;
            } else { resultado += texto.charAt(i); }
        }
        return resultado;
    }

    function xorBase64(texto, chave, descriptografar = false) {
        if (!chave) chave = "padrao";
        if (descriptografar) {
            try {
                let decodificado = atob(texto);
                let resultado = "";
                for (let i = 0; i < decodificado.length; i++) resultado += String.fromCharCode(decodificado.charCodeAt(i) ^ chave.charCodeAt(i % chave.length));
                return decodeURIComponent(escape(resultado));
            } catch (e) { return "Erro: Base64 corrompido."; }
        } else {
            let utf8texto = unescape(encodeURIComponent(texto));
            let resultado = "";
            for (let i = 0; i < utf8texto.length; i++) resultado += String.fromCharCode(utf8texto.charCodeAt(i) ^ chave.charCodeAt(i % chave.length));
            return btoa(resultado);
        }
    }

    async function aesNativo(texto, senha, descriptografar = false) {
        const enc = new TextEncoder();
        const hash = await crypto.subtle.digest('SHA-256', enc.encode(senha));
        const key = await crypto.subtle.importKey('raw', hash, {name: 'AES-GCM'}, false, ['encrypt', 'decrypt']);

        if (descriptografar) {
            try {
                const dec = atob(texto);
                const combined = new Uint8Array(dec.length);
                for(let i=0; i<dec.length; i++) combined[i] = dec.charCodeAt(i);
                const iv = combined.slice(0, 12);
                const ciphertext = combined.slice(12);
                const decrypted = await crypto.subtle.decrypt({name: 'AES-GCM', iv: iv}, key, ciphertext);
                return new TextDecoder().decode(decrypted);
            } catch (e) {
                return "Erro AES: Senha incorreta ou dados violados.";
            }
        } else {
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const ciphertext = await crypto.subtle.encrypt({name: 'AES-GCM', iv: iv}, key, enc.encode(texto));
            const combined = new Uint8Array(iv.length + ciphertext.byteLength);
            combined.set(iv, 0);
            combined.set(new Uint8Array(ciphertext), iv.length);
            let bin = "";
            for (let i = 0; i < combined.byteLength; i++) bin += String.fromCharCode(combined[i]);
            return btoa(bin);
        }
    }

    async function criptografar() {
        let texto = document.getElementById("txt_original").value.trim();
        let senha = document.getElementById("txt_senha").value.trim();
        let metodo = document.getElementById("combo_metodo").value;

        if (!texto || !senha) return alert("Preencha o Texto Original e a Senha.");
        
        let resultado = "";
        if (metodo === "vigenere") resultado = vigenere(texto, senha, false);
        else if (metodo === "xor") resultado = xorBase64(texto, senha, false);
        else if (metodo === "aes") resultado = await aesNativo(texto, senha, false);

        document.getElementById("txt_cripto").value = resultado;
        atualizarStatus("Texto criptografado na tela. Seguro e sem rastros.", "success");
    }

    async function descriptografar() {
        let textoCripto = document.getElementById("txt_cripto").value.trim();
        let senha = document.getElementById("txt_senha").value.trim();
        let metodo = document.getElementById("combo_metodo").value;

        if (!textoCripto || !senha) return alert("Preencha o Texto Criptografado e a Senha.");

        let resultado = "";
        if (metodo === "vigenere") resultado = vigenere(textoCripto, senha, true);
        else if (metodo === "xor") resultado = xorBase64(textoCripto, senha, true);
        else if (metodo === "aes") resultado = await aesNativo(textoCripto, senha, true);

        document.getElementById("txt_original").value = resultado;
        
        if(resultado.startsWith("Erro")) atualizarStatus("Falha na descriptografia.", "error");
        else atualizarStatus("Texto descriptografado com sucesso.", "success");
    }

    async function gravarTag() {
        let texto = document.getElementById("txt_cripto").value.trim();
        if (!texto) return alert("Não há texto criptografado para gravar.");

        try {
            const ndef = new NDEFReader();
            atualizarStatus("Aproxime a tag NFC da traseira do celular...", "warning");
            await ndef.write(texto);
            atualizarStatus("Gravado na Tag com sucesso!", "success");
        } catch (error) {
            atualizarStatus(`Erro ao gravar: ${error.message}`, "error");
        }
    }

    async function lerTag() {
        try {
            const ndef = new NDEFReader();
            await ndef.scan();
            atualizarStatus("Aproxime a tag NFC da traseira do celular...", "warning");

            ndef.onreading = event => {
                const message = event.message;
                for (const record of message.records) {
                    if (record.recordType === "text") {
                        const textDecoder = new TextDecoder(record.encoding);
                        const textoLido = textDecoder.decode(record.data);
                        
                        document.getElementById("txt_cripto").value = textoLido;
                        document.getElementById("txt_original").value = ""; 
                        atualizarStatus("Tag lida! Coloque a senha para descriptografar.", "success");
                        return;
                    }
                }
                atualizarStatus("Tag lida, mas não continha texto NDEF padrão.", "warning");
            };
            
            ndef.onreadingerror = () => {
                atualizarStatus("Erro de leitura. A tag não está formatada ou falhou.", "error");
            };
            
        } catch (error) {
            atualizarStatus(`Erro de permissão ou hardware: ${error.message}`, "error");
        }
    }
</script>

</body>
</html>
